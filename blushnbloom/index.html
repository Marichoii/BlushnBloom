<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blush & Bloom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" href="assets/images/favicon.png" type="image/png">

</head>

<body>
  <header class="bg-light py-3 text-center border-bottom border-pink">
    <h1>Blush & Bloom</h1>
    <p class="lead">Your delicate and charming makeup simulator</p>
  </header>

  <main class="container my-5">
    <div class="container-custom">
      <div class="row">
        <div class="col-md-6">
          <h2>Select Your Features</h2>
          <form>
            <div class="mb-3">
              <label for="skinTone" class="form-label">Skin Tone</label>
              <select id="skinTone" class="form-select">
                <option>Light</option>
                <option>Medium</option>
                <option>Dark</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="eyeColor" class="form-label">Eye Color</label>
              <select id="eyeColor" class="form-select">
                <option>Brown</option>
                <option>Blue</option>
                <option>Green</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="hairColor" class="form-label">Hair Color</label>
              <select id="hairColor" class="form-select">
                <option>Blonde</option>
                <option>Brown</option>
                <option>Black</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="occasion" class="form-label">Occasion</label>
              <select id="occasion" class="form-select">
                <option>Party</option>
                <option>Work</option>
                <option>Casual</option>
                <option>Romantic</option>
                <option>Photo Shoot</option>
              </select>
            </div>
            <button type="submit" class="btn btn-canmake">See Suggestions</button>
          </form>
        </div>

        <div class="col-md-6">
          <div class="card card-custom p-3">
            <h3>Look Suggestion</h3>
            <p id="suggestion-text">Your personalized suggestion will appear here.</p>
            <img id="suggestion-image" src="" class="img-fluid rounded my-3" style="display: block;">
            <a id="product-link" href="#" target="_blank" class="btn btn-outline-pink btn-sm" style="display: none;">See
              Product</a>

          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-light text-center py-3 border-top">
    <small>&copy; 2025 Blush & Bloom - Inspired by Canmake Tokyo</small>
  </footer>
  <script src="assets/js/simulator.js"></script>
</body>

</html>
